  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.projects)) return {
        darkMode: !!parsed.darkMode,
        projects: parsed.projects
      };
    }
  }catch(err){ /* corrupted storage, fall back to fresh state */ }
  return { darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches, projects: [seedProject()] };
}

function getActiveProject(){ return state.projects.find(p => p.id === state.activeProjectId) || null; }
function getRowData(project, rowNum){ return (project.rows || []).find(r => r.row === rowNum) || null; }
function getTotal(p){ return p.totalRows || ((p.rows && p.rows.length) ? Math.max(...p.rows.map(r => r.row)) : 0); }
function rowWord(p){ return p.craft === 'crochet' ? 'Tur' : 'Sıra'; }

/* Piksel şema: sayfadaki satır sırası genelde yukarıdan aşağı (resmin tepesinden tabanına).
   Örgüye ise genelde en alttan başlanır, bu yüzden iş sırası ters çevrilir; ayrıca düz
   örgüde her satırda iş yönü değişir (git-gel), bu da tek/çift satırlarda diziyi ters çevirerek yansıtılır. */
function getChartWorkRow(project, workRow){
  const c = project.chart; if(!c) return null;
  if(workRow < 1 || workRow > c.height) return null;
  const sheetIdx = c.bottomToTop ? (c.height - workRow) : (workRow - 1);
  const codes = c.grid[sheetIdx];
  if(!codes) return null;
  const reversed = c.alternateDirection && (workRow % 2 === 1);
  return reversed ? codes.slice().reverse() : codes;
}
function legendMapOf(project){
  const map = {};
  ((project.chart && project.chart.legend) || []).forEach(l => { map[l.code] = l; });
  return map;
}
function runLengthEncode(codes, legendMap){
  if(!codes) return [];
  const runs = [];
  codes.forEach(code => {
    const last = runs[runs.length - 1];
    if(last && last.code === code) last.count++;
    else runs.push({ code, count: 1 });
  });
  return runs.map(r => {
    const entry = legendMap[String(r.code)];
    return { code: r.code, count: r.count, hex: (entry && entry.hex) || '#CCCCCC', label: (entry && entry.label) || `Kod ${r.code}` };
  });
}

/* ============================== UTILITIES ============================== */
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
const escapeAttr = escapeHtml;

function haptic(pattern){ if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} } }

function timeAgo(ts){
  const diff = Math.max(0, Date.now() - ts);
  const min = Math.floor(diff / 60000);
  if(min < 1) return 'az önce';
  if(min < 60) return `${min} dk önce`;
  const hr = Math.floor(min / 60);
  if(hr < 24) return `${hr} sa önce`;
  return `${Math.floor(hr / 24)} gün önce`;
}

function formatTime(totalSeconds){
  const s = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(s / 3600).toString().padStart(2, '0');
  const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function computeElapsed(p){
  return p.timeSpent + (p.timerRunning && p.timerStartedAt ? (Date.now() - p.timerStartedAt) / 1000 : 0);
}

function hexToRgb(hex){
  const h = (hex || '#CCCCCC').replace('#', '');
  const full = h.length === 3 ? h.split('').map(ch => ch + ch).join('') : h;
  const n = parseInt(full, 16) || 0xCCCCCC;
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function drawChartPreview(project){
  const canvas = document.getElementById('chartPreviewCanvas');
  if(!canvas || !project.chart) return;
  const c = project.chart;
  canvas.width = c.width;
  canvas.height = c.height;
  const ctx = canvas.getContext('2d');
  const legendMap = legendMapOf(project);
  const imgData = ctx.createImageData(c.width, c.height);
  for(let y = 0; y < c.height; y++){
    const row = c.grid[y];
    for(let x = 0; x < c.width; x++){
      const entry = legendMap[String(row[x])];
      const rgb = hexToRgb(entry ? entry.hex : '#CCCCCC');
      const idx = (y * c.width + x) * 4;
      imgData.data[idx] = rgb.r; imgData.data[idx + 1] = rgb.g; imgData.data[idx + 2] = rgb.b; imgData.data[idx + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function buildRowsFromTable(tableRows){
  if(!tableRows || !tableRows.length) return [];
  const palette = ['#F3C6D3', '#BDE7D8', '#D8CDEF', '#F5E9DA', '#FBD1A2', '#A9D6E5', '#F6A6B2', '#C9E4C5'];
  const colorHexMap = {};
  let nextIdx = 0;
  let startIdx = 0;
  const firstCols = tableRows[0].map(c => String(c ?? '').trim());
  if(isNaN(parseInt(firstCols[0], 10))) startIdx = 1;
  const rows = [];
  for(let i = startIdx; i < tableRows.length; i++){
    const cols = tableRows[i].map(c => String(c ?? '').trim());
    if(!cols.some(c => c)) continue;
    const rowNum = parseInt(cols[0], 10) || (rows.length + 1);
    const color = cols[1] || 'Belirtilmemiş';
    const stitches = parseInt(cols[2], 10) || 0;
    const note = cols[3] || '';
    if(!colorHexMap[color]){ colorHexMap[color] = palette[nextIdx % palette.length]; nextIdx++; }
    rows.push({ row: rowNum, color, hex: colorHexMap[color], stitches, note });
  }
  return rows;
}
function parsePastedRows(text){
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const tableRows = lines.map(l => l.split(/\t|,/));
  return buildRowsFromTable(tableRows);
}
/* Grafik/piksel şema (graphgan) tespiti: bir sayfa büyük, sayısal bir hücre ızgarasıysa
   (satır=iş sırası, hücre=renk kodu) bunu düz "Sıra/Renk/İlmek" listesi yerine şema olarak ele al. */
function analyzeWorkbookForChart(wb){
  const sheetInfos = wb.SheetNames.map(name => ({
    name, ws: wb.Sheets[name],
    aoa: XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, raw: false, defval: '' })
  }));
  let gridInfo = null, bestScore = 0;
  sheetInfos.forEach(info => {
    const aoa = info.aoa;
    if(aoa.length < 10) return;
    const width = Math.max(...aoa.map(r => r.length));
    if(width < 10) return;
    let numericCount = 0, total = 0;
    aoa.forEach(r => r.forEach(c => {
      total++;
      const s = String(c ?? '').trim();
      const n = parseInt(s, 10);
      if(s !== '' && !isNaN(n) && String(n) === s && n >= 0 && n < 200) numericCount++;
    }));
    const ratio = total ? numericCount / total : 0;
    const score = ratio * aoa.length * width;
    if(ratio > 0.7 && score > bestScore){ bestScore = score; gridInfo = info; }
  });
  if(!gridInfo) return null;

  let legendInfo = null;
  sheetInfos.forEach(info => {
    if(info === gridInfo) return;
    const aoa = info.aoa;
    if(aoa.length < 2 || aoa.length > 300) return;
    const col0nums = aoa.map(r => parseInt(String(r[0] ?? '').trim(), 10)).filter(n => !isNaN(n));
    if(col0nums.length >= Math.min(3, aoa.length - 1)){
      if(!legendInfo || aoa.length > legendInfo.aoa.length) legendInfo = info;
    }
  });

  let instructionsInfo = null;
  sheetInfos.forEach(info => {
    if(info === gridInfo || info === legendInfo || instructionsInfo) return;
    instructionsInfo = info;
  });

  return { gridInfo, legendInfo, instructionsInfo };
}
function normalizeGrid(aoa){
  const width = Math.max(...aoa.map(r => r.length));
  return aoa.map(row => {
    const codes = row.map(c => { const n = parseInt(String(c ?? '').trim(), 10); return isNaN(n) ? 0 : n; });
    while(codes.length < width) codes.push(0);
    return codes;
  });
}
function extractLegendColors(legendWs, legendAoa){
  if(!legendAoa.length) return [];
  const numCols = Math.max(...legendAoa.map(r => r.length));
  let colorCol = 1, bestBlankRatio = -1;
  for(let col = 1; col < numCols; col++){
    let blanks = 0, count = 0;
    for(let r = 1; r < legendAoa.length; r++){ count++; if(!String(legendAoa[r][col] ?? '').trim()) blanks++; }
    const ratio = count ? blanks / count : 0;
    if(ratio > bestBlankRatio){ bestBlankRatio = ratio; colorCol = col; }
  }
  const colLetter = XLSX.utils.encode_col(colorCol);
  const results = [];
  for(let r = 1; r < legendAoa.length; r++){
    const code = String(legendAoa[r][0] ?? '').trim();
    if(!code) continue;
    const cell = legendWs ? legendWs[colLetter + (r + 1)] : null;
    let hex = '#CCCCCC';
    const rgb = cell && cell.s && ((cell.s.fgColor && cell.s.fgColor.rgb) || (cell.s.bgColor && cell.s.bgColor.rgb));
    if(rgb) hex = '#' + rgb.slice(-6);
    let label = '';
    for(let c = 0; c < legendAoa[r].length; c++){
      if(c === 0 || c === colorCol) continue;
      const v = String(legendAoa[r][c] ?? '').trim();
      if(v){ label = v; break; }
    }
    results.push({ code, hex, label: label || `Renk ${code}` });
  }
  return results;
}
function extractInstructionsText(info){
  if(!info) return '';
  return info.aoa.map(row => row.map(c => String(c ?? '').trim()).filter(Boolean).join(': ')).filter(Boolean).join('\n');
}
function parseExcelWorkbook(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellStyles: true });
        const analysis = analyzeWorkbookForChart(wb);
        if(analysis){
          const grid = normalizeGrid(analysis.gridInfo.aoa);
          const legend = extractLegendColors(analysis.legendInfo ? analysis.legendInfo.ws : null, analysis.legendInfo ? analysis.legendInfo.aoa : []);
          const instructions = extractInstructionsText(analysis.instructionsInfo);
          resolve({ type: 'chart', grid, legend, instructions, width: grid[0].length, height: grid.length });
        } else {
          const aoa = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: false, defval: '' });
          resolve({ type: 'simple', rows: buildRowsFromTable(aoa) });
        }
      }catch(err){ reject(err); }
    };
    reader.onerror = () => reject(new Error('read failed'));
    reader.readAsArrayBuffer(file);
  });
}

/* ============================== HISTORY / UNDO ============================== */
function pushHistory(p, prop, value){
  p.history = p.history || [];
  p.history.push({ prop, value });
  if(p.history.length > 5) p.history.shift();
}
function undoLast(){
  const p = getActiveProject();
  if(!p || !p.history || !p.history.length) return;
  const last = p.history.pop();
  p[last.prop] = last.value;
  if(last.prop === 'currentRow') p.currentBlockIndex = 0;
  save(); render();
  showToast('Geri alındı');
}

/* ============================== ACTIONS: COUNTER ============================== */
function handleCounterInc(){
  const p = getActiveProject(); if(!p) return;
  if(p.locked){ showToast('🔒 Kilitli — kilidi açmak için asma kilide basılı tutun'); return; }
  const total = getTotal(p);
  const prevRowData = getRowData(p, p.currentRow);
  pushHistory(p, 'currentRow', p.currentRow);
  p.currentRow += 1;
  p.currentBlockIndex = 0;
  const newRowData = getRowData(p, p.currentRow);
  p.updatedAt = Date.now();
  save(); render();
  if(total && p.currentRow === total + 1){
    haptic([40, 30, 40, 30, 80]);
    showToast('🎉 Tebrikler! Deseni tamamladın!', { actionLabel: 'Geri Al', onAction: undoLast, duration: 5000 });
    return;
  }
  if(prevRowData && newRowData && prevRowData.color !== newRowData.color) haptic([30, 40, 30]);
  else haptic(15);
  showToast(`${rowWord(p)} ${p.currentRow}`, { actionLabel: 'Geri Al', onAction: undoLast });
}
function handleCounterDec(){
  const p = getActiveProject(); if(!p) return;
  if(p.locked){ showToast('🔒 Kilitli — kilidi açmak için asma kilide basılı tutun'); return; }
  if(p.currentRow <= 1) return;
  pushHistory(p, 'currentRow', p.currentRow);
  p.currentRow -= 1;
  p.currentBlockIndex = 0;
  p.updatedAt = Date.now();
  haptic(15);
  save(); render();
  showToast(`${rowWord(p)} ${p.currentRow}`, { actionLabel: 'Geri Al', onAction: undoLast });
}
function handleRepeatInc(){
  const p = getActiveProject(); if(!p || p.locked) return;
  pushHistory(p, 'repeatCount', p.repeatCount);
  p.repeatCount++; haptic(10); save(); render();
}
function handleRepeatDec(){
  const p = getActiveProject(); if(!p || p.locked) return;
  if(p.repeatCount <= 0) return;
  pushHistory(p, 'repeatCount', p.repeatCount);
  p.repeatCount--; haptic(10); save(); render();
}
function handleJumpToRow(rowNum){
  const p = getActiveProject(); if(!p || p.locked) return;
  pushHistory(p, 'currentRow', p.currentRow);
  p.currentRow = rowNum; p.currentBlockIndex = 0; p.updatedAt = Date.now();

function handleBlockNext(){

  const runs = runLengthEncode(getChartWorkRow(p, p.currentRow), legendMapOf(p));
  if(!runs.length) return;
  const idx = p.currentBlockIndex || 0;
  if(idx < runs.length - 1){ p.currentBlockIndex = idx + 1; haptic(10); save(); render(); }
  else { haptic([20, 20, 20]); showToast('Bu sıradaki son blok — "+ Sıra" ile ilerleyebilirsin'); }
}
function handleBlockPrev(){

/* ============================== ACTIONS: GAUGE CORRECTION ============================== */
/* İlmekler kare değildir (genelde eninden farklı yüksekliktedir). Kareye göre çizilmiş bir
   piksel şemasını gerçek gauge'a göre düzeltmek için, kullanıcının ölçtüğü ilmek eni / sıra
   yüksekliği oranı kadar ızgarayı "en yakın komşu" (nearest-neighbor) yöntemiyle yeniden
   örnekliyoruz — renk oranlarını tahmini ölçeklemek yerine gerçek piksel konumlarını örnekler,
   böylece ince detaylar (kontur gibi) mümkün olduğunca korunur. Her zaman orijinal (bozulmamış)
   ızgaradan yeniden hesaplanır, böylece art arda düzeltmeler birikerek bozulmaya yol açmaz. */
function resampleGridWidth(grid, newWidth){
  const oldWidth = grid[0].length;
  return grid.map(row => {
    const newRow = new Array(newWidth);
    for(let i = 0; i < newWidth; i++) newRow[i] = row[Math.min(oldWidth - 1, Math.floor(i * oldWidth / newWidth))];
    return newRow;
  });
}
function resampleGridHeight(grid, newHeight){
  const oldHeight = grid.length;
  const result = new Array(newHeight);
  for(let i = 0; i < newHeight; i++) result[i] = grid[Math.min(oldHeight - 1, Math.floor(i * oldHeight / newHeight))].slice();
  return result;
}
function handleApplyGaugeFix(){
  const p = getActiveProject(); if(!p || !p.chart) return;
  const c = p.chart;
  const sw = c.stitchWidthMm, rh = c.rowHeightMm;
  if(!sw || !rh){ showToast('Lütfen önce ilmek eni ve sıra yüksekliğini (mm) girin'); return; }
  const ratio = sw / rh;
  if(Math.abs(ratio - 1) < 0.03){ showToast('Gauge zaten kareye çok yakın, düzeltmeye gerek yok'); return; }
  if(!c.originalGrid){ c.originalGrid = c.grid.map(r => r.slice()); c.originalWidth = c.width; c.originalHeight = c.height; }
  if((c.gaugeFixAxis || 'width') === 'height'){
    const newHeight = Math.max(4, Math.round(c.originalHeight * ratio));
    c.grid = resampleGridHeight(c.originalGrid, newHeight);
    c.height = newHeight;
    p.totalRows = newHeight;
    p.currentRow = Math.min(p.currentRow, newHeight) || 1;
    showToast(`Sıra sayısı ${c.originalHeight} → ${newHeight} olarak güncellendi`);
  } else {
    const newWidth = Math.max(4, Math.round(c.originalWidth / ratio));
    c.grid = resampleGridWidth(c.originalGrid, newWidth);
    c.width = newWidth;
    showToast(`İlmek sayısı ${c.originalWidth} → ${newWidth} olarak güncellendi`);
  }
  p.updatedAt = Date.now();
  save(); render();
}
function handleRevertGaugeFix(){
  const p = getActiveProject(); if(!p || !p.chart || !p.chart.originalGrid) return;
  const c = p.chart;
  c.grid = c.originalGrid.map(r => r.slice());
  c.width = c.originalWidth; c.height = c.originalHeight;
  delete c.originalGrid; delete c.originalWidth; delete c.originalHeight;
  p.totalRows = c.height;
  p.currentRow = Math.min(p.currentRow, c.height) || 1;
  p.updatedAt = Date.now();
  save(); render();
  showToast('Orijinal şemaya dönüldü');
}
function downloadExport(){
  const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), projects: state.projects }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

/* ============================== LONG PRESS ============================== */
function bindLongPress(el, onComplete, duration = 850){
  let timer = null;
  const fillEl = el.querySelector('.longpress-fill');
  function begin(e){
    e.preventDefault();
    if(fillEl){ fillEl.style.transition = `transform ${duration}ms linear`; requestAnimationFrame(() => { fillEl.style.transform = 'scaleX(1)'; }); }
    timer = setTimeout(() => { haptic([20, 30, 20]); onComplete(); cancel(); }, duration);
  }
  function cancel(){
    if(timer){ clearTimeout(timer); timer = null; }
    if(fillEl){ fillEl.style.transition = 'none'; fillEl.style.transform = 'scaleX(0)'; }
  }
  el.addEventListener('pointerdown', begin);
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointerleave', cancel);
  el.addEventListener('pointercancel', cancel);
  el.addEventListener('click', e => e.stopPropagation());
}
function dispatchLongpress(value){
  const [action, id] = value.split(':');
  if(action === 'reset-counter') handleResetCounter();
  else if(action === 'delete-project') handleDeleteProject(id);
  else if(action === 'unlock') handleUnlock(id);
  else if(action === 'reset-all') handleResetAllData();
}

function renderChartPlanTab(project){
  const c = project.chart;
  const legendMap = legendMapOf(project);
  const sheetIdx = c.bottomToTop ? (c.height - project.currentRow) : (project.currentRow - 1);
  const markerPct = Math.min(100, Math.max(0, (sheetIdx / c.height) * 100));
  const previewHtml = `
    <div class="relative mb-4 rounded-xl overflow-hidden border border-violet-100 dark:border-violet-900/40">

      <div class="absolute left-1 text-[9px] font-bold text-white bg-rose-500 px-1.5 py-0.5 rounded" style="top:${markerPct}%; transform:translateY(-50%);">Buradasın</div>
    </div>`;
  const rowsHtml = Array.from({ length: c.height }, (_, i) => i + 1).map(wr => {
    const codes = getChartWorkRow(project, wr);
    const runs = runLengthEncode(codes, legendMap);
    const active = wr === project.currentRow;
    return `
    <div data-action="jump-to-row" data-row="${wr}" role="button" tabindex="0" class="w-full flex items-center gap-2 p-2 rounded-xl border cursor-pointer transition ${active ? 'border-violet-400 bg-violet-50 dark:bg-violet-900/30 dark:border-violet-500' : 'border-violet-100 dark:border-violet-900/30 bg-white dark:bg-[#211d2e]'}">

      <div class="flex-1 flex h-4 rounded overflow-hidden border border-black/5 dark:border-white/10">
        ${runs.map(r => `<span style="width:${(r.count / codes.length * 100)}%;background:${escapeAttr(r.hex)}" title="${escapeAttr(r.label)}"></span>`).join('')}
      </div>
      <span class="text-[10px] text-violet-400 dark:text-violet-400 shrink-0">${runs.length} renk</span>
    </div>`;
  }).join('');
  return `
  <div class="px-4 py-3 pb-10">
    ${previewHtml}
    <div class="flex items-center justify-between mb-3">
      <div class="text-xs text-violet-400 dark:text-violet-400">${c.height} ${rowWord(project).toLowerCase()} × ${c.width} ilmek (piksel şema)</div>

  </div>`;
}

let tickerInterval = null;
function refreshTicker(){
  if(tickerInterval){ clearInterval(tickerInterval); tickerInterval = null; }
  const p = getActiveProject();
  if(state.view === 'project' && p && p.timerRunning){
    tickerInterval = setInterval(() => {
      const el = document.getElementById('timerDisplay');
      if(el) el.textContent = formatTime(computeElapsed(p));
    }, 1000);
  }
}
function updateThemeColorMeta(){
  document.documentElement.classList.toggle('dark', state.darkMode);
}
function render(){
  updateThemeColorMeta();
  const app = document.getElementById('app');
  const project = getActiveProject();
  app.innerHTML = (state.view === 'project' && project) ? renderProjectView(project) : renderDashboard();
  document.getElementById('modalRoot').innerHTML = renderModal();
  bindDynamic();
  refreshTicker();
  if(project && project.mode === 'chart' && state.view === 'project') drawChartPreview(project);
}
function bindDynamic(){
  document.querySelectorAll('[data-longpress]').forEach(el => bindLongPress(el, () => dispatchLongpress(el.dataset.longpress)));
}

/* ============================== GLOBAL EVENT DELEGATION ============================== */
let notesSaveTimer = null;
let chartSaveTimer = null;
document.body.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  switch(action){
    case 'open-project': state.view = 'project'; state.activeProjectId = id; state.projectTab = 'counter'; render(); break;
    case 'back-to-dashboard': commitRunningTimers(); state.view = 'dashboard'; state.activeProjectId = null; save(); render(); break;
    case 'new-project': openNewProjectModal(); break;
    case 'edit-project': openEditProjectModal(id); break;
    case 'toggle-dark': state.darkMode = !state.darkMode; save(); render(); break;
    case 'open-settings': state.modal = { type: 'settings' }; render(); break;
    case 'close-modal': state.modal = null; render(); break;
    case 'save-project-form': saveProjectForm(); break;
    case 'toggle-paste': state.modal.showPaste = !state.modal.showPaste; render(); break;
    case 'parse-pasted-rows': parsePastedRowsAction(); break;
    case 'upload-excel': document.getElementById('excelFileInput').click(); break;
    case 'add-row': {
      const rows = state.modal.draft.rows;
      const nextRowNum = rows.length ? Math.max(...rows.map(r => r.row)) + 1 : 1;
      rows.push({ row: nextRowNum, color: '', hex: '#D8CDEF', stitches: 0, note: '' });
      render();
      break;
    }
    case 'remove-row': state.modal.draft.rows.splice(parseInt(el.dataset.index, 10), 1); render(); break;
    case 'clear-chart': delete state.modal.draft.chart; state.modal.draft.mode = 'simple'; render(); break;
    case 'apply-gauge-fix': handleApplyGaugeFix(); break;
    case 'revert-gauge-fix': handleRevertGaugeFix(); break;
    case 'tab-counter': state.projectTab = 'counter'; render(); break;
    case 'tab-plan': state.projectTab = 'plan'; render(); break;
    case 'tab-legend': state.projectTab = 'legend'; render(); break;
    case 'tab-notes': state.projectTab = 'notes'; render(); break;
    case 'counter-inc': handleCounterInc(); break;
    case 'counter-dec': handleCounterDec(); break;
    case 'repeat-inc': handleRepeatInc(); break;
    case 'repeat-dec': handleRepeatDec(); break;
    case 'block-next': handleBlockNext(); break;
    case 'block-prev': handleBlockPrev(); break;
    case 'jump-to-row': handleJumpToRow(parseInt(el.dataset.row, 10)); break;
    case 'timer-toggle': handleTimerToggle(); break;
    case 'toggle-wakelock': handleToggleWakelock(); break;
    case 'toggle-lock': handleToggleLockTap(id); break;
    case 'export-data': downloadExport(); break;
    case 'import-data': document.getElementById('importFileInput').click(); break;
    case 'install-app': handleInstallApp(); break;
  }
});
document.body.addEventListener('keydown', (e) => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const el = e.target.closest('[data-action]');
  if(el){ e.preventDefault(); el.click(); }
});
document.body.addEventListener('input', (e) => {
  const rowField = e.target.closest('[data-row-field]');
  if(rowField && state.modal && state.modal.draft){
    const idx = parseInt(rowField.dataset.rowIndex, 10);
    const field = rowField.dataset.rowField;
    let val = rowField.value;
    if(field === 'row' || field === 'stitches') val = parseInt(val, 10) || 0;
    state.modal.draft.rows[idx][field] = val;
    return;
  }
  if(state.modal && state.modal.draft){
    const d = state.modal.draft;
    if(e.target.id === 'f_name'){ d.name = e.target.value; return; }
    if(e.target.id === 'f_pattern'){ d.pattern = e.target.value; return; }
    if(e.target.id === 'f_hook'){ d.hookSize = e.target.value; return; }
    if(e.target.id === 'f_total'){ d.totalRows = parseInt(e.target.value, 10) || 0; return; }
  }
  if(e.target.id === 'notesInput'){
    const p = getActiveProject();
    if(!p) return;
    p.notes = e.target.value;
    p.updatedAt = Date.now();
    const statusEl = document.getElementById('notesStatus');
    if(statusEl) statusEl.textContent = 'Kaydediliyor…';
    clearTimeout(notesSaveTimer);
    notesSaveTimer = setTimeout(() => {
      save();
      const s = document.getElementById('notesStatus');
      if(s) s.textContent = 'Kaydedildi ✓';
    }, 700);
    return;
  }
  const legendField = e.target.closest('[data-legend-field]');
  if(legendField){
    const p = getActiveProject();
    if(!p || !p.chart) return;
    const entry = p.chart.legend.find(l => l.code === legendField.dataset.legendCode);
    if(entry){
      entry[legendField.dataset.legendField] = legendField.value;
      p.updatedAt = Date.now();
      clearTimeout(chartSaveTimer);
      chartSaveTimer = setTimeout(save, 500);
    }
    return;
  }
  if(e.target.id === 'f_stitchWidth' || e.target.id === 'f_rowHeight'){
    const p = getActiveProject();
    if(!p || !p.chart) return;
    if(e.target.id === 'f_stitchWidth') p.chart.stitchWidthMm = parseFloat(e.target.value) || 0;
    else p.chart.rowHeightMm = parseFloat(e.target.value) || 0;
    p.updatedAt = Date.now();
    clearTimeout(chartSaveTimer);
    chartSaveTimer = setTimeout(save, 500);
  }
});
document.body.addEventListener('change', (e) => {
  if(e.target.id === 'f_craft' && state.modal && state.modal.draft){ state.modal.draft.craft = e.target.value; return; }
  const toggle = e.target.closest('[data-chart-toggle]');
  if(toggle){
    const p = getActiveProject();
    if(!p || !p.chart) return;
    p.chart[toggle.dataset.chartToggle] = toggle.checked;
    p.updatedAt = Date.now();
    save(); render();
    return;
  }
  const radio = e.target.closest('[data-chart-radio]');
  if(radio){
    const p = getActiveProject();
    if(!p || !p.chart) return;
    p.chart[radio.dataset.chartRadio] = radio.value;
    p.updatedAt = Date.now();
    save(); render();
  }
});
document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.projects)) throw new Error('invalid');
      const ok = confirm(`${data.projects.length} proje içeren yedek bulundu. Mevcut ${state.projects.length} projenizin üzerine yazılacak. Devam edilsin mi?`);
      if(ok){
        state.projects = data.projects;
        state.modal = null;
        save(); render();
        showToast('Veriler içe aktarıldı');
      }
    }catch(err){
      showToast('Dosya okunamadı, geçersiz format');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

document.getElementById('excelFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file || !state.modal || !state.modal.draft) return;
  parseExcelWorkbook(file).then(result => {
    if(result.type === 'chart'){
      if(!result.legend.length){ showToast('Renk lejantı bulunamadı, dosya formatını kontrol edin'); return; }
      const d = state.modal.draft;
      d.mode = 'chart';
      d.chart = {
        width: result.width, height: result.height, grid: result.grid,
        legend: result.legend, instructions: result.instructions,
        bottomToTop: true, alternateDirection: true
      };
      d.totalRows = result.height;
      d.currentRow = Math.min(d.currentRow || 1, result.height) || 1;
      state.modal.showPaste = false;
      render();
      showToast(`Piksel şema yüklendi: ${result.height} ${rowWord(d).toLowerCase()} × ${result.width} ilmek, ${result.legend.length} renk`);
    } else {
      applyParsedRowsToDraft(result.rows);
    }
  }).catch(() => showToast('Excel dosyası okunamadı, dosya bozuk olabilir'));
  e.target.value = '';
});

/* ============================== BOOT ============================== */
render();
</script>
</body>
